spring.datasource.url=jdbc:h2:mem:tickets_test;MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/event-ticket-platform/protocol/openid-connect/certs
