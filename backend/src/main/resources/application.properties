spring.application.name=tickets

# Database Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changemeinprod!}
spring.datasource.hikari.data-source-properties.options=-c TimeZone=UTC
# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}

app.jwt.secret=${APP_JWT_SECRET:dev-only-change-me-dev-only-change-me-dev-only-change-me}
app.jwt.issuer=${APP_JWT_ISSUER:event-ticket-platform}
app.jwt.expiry-hours=${APP_JWT_EXPIRY_HOURS:8}

